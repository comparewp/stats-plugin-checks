name: Plugin Check Stats

on:
  #schedule:
  #  - cron: '* * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin_slug:
          - pods
    steps:
      - name: Download plugin from WordPress.org
        run: |
          curl --fail -L "https://downloads.wordpress.org/plugin/${{ matrix.plugin_slug }}.zip" -o plugin.zip
          unzip plugin.zip

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        continue-on-error: true
        with:
          build-dir: ./${{ matrix.plugin_slug }}
          slug: ${{ matrix.plugin_slug }}

      - name: POST results to API
        env:
          COMPAREWPORG_API_KEY: ${{ secrets.COMPAREWPORG_API_KEY }}
        run: |
          RESULTS_FILE="${{ runner.temp }}/plugin-check-results.txt"
          if [ ! -f "$RESULTS_FILE" ]; then
            echo "Results file not found, skipping POST."
            exit 0
          fi
          curl --fail-with-body
            "https://comparewp.org/plugin-check-api/pods/?api_key=$COMPAREWPORG_API_KEY" || true
            
          curl --fail-with-body -X POST \
            "https://comparewp.org/plugin-check-api/${{ matrix.plugin_slug }}/?skctest=1" || true
            
          curl --fail-with-body -X POST \
            --data-binary @"$RESULTS_FILE" \
            "https://comparewp.org/plugin-check-api/${{ matrix.plugin_slug }}/?api_key=$COMPAREWPORG_API_KEY" || true
